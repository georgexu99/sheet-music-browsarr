{% extends "base.html" %}
{% block title %}sheet-music-browsarr{% endblock %}
{% block content %}
<nav class="flex items-center gap-4 text-sm border-b border-gray-200 dark:border-gray-800 pb-3 mb-6">
  <a href="/" class="text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-gray-100">&larr; Back to search</a>
</nav>

<div class="px-4 py-3 rounded-lg bg-blue-50 border border-blue-200 text-blue-900 dark:bg-blue-950 dark:border-blue-900 dark:text-blue-200 text-sm">
  {{ message }}
</div>

{% if !query.is_empty() %}
  <p class="mt-4 text-sm text-gray-500 dark:text-gray-400">
    <a href="/search?q={{ query }}" class="text-blue-600 dark:text-blue-400 hover:underline">Back to results for &ldquo;{{ query }}&rdquo;</a>
  </p>
{% endif %}
{% endblock %}
