{% extends "base.html" %}
{% block title %}Sign in &mdash; sheet-music-browsarr{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto pt-8">
  <h1 class="text-2xl font-semibold tracking-tight mb-1">Sign in</h1>
  <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Admin only.</p>

  {% match error %}
    {% when Some with (msg) %}
      <div class="mb-4 px-4 py-3 rounded-lg bg-rose-50 border border-rose-200 text-rose-900 dark:bg-rose-950 dark:border-rose-900 dark:text-rose-200 text-sm">{{ msg }}</div>
    {% when None %}
  {% endmatch %}

  <form method="post" action="/login" class="space-y-4">
    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">
      Password
      <input
        type="password"
        name="password"
        required
        autofocus
        autocomplete="current-password"
        class="mt-1 w-full text-base px-3 py-2 rounded-md border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
      >
    </label>
    <button type="submit" class="w-full inline-flex items-center justify-center px-4 py-2 rounded-md bg-gray-900 text-white hover:bg-gray-800 dark:bg-gray-100 dark:text-gray-900 dark:hover:bg-white font-medium text-sm transition-colors">
      Sign in
    </button>
  </form>
</div>
{% endblock %}
