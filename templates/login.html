{% extends "base.html" %}
{% block title %}Sign in &mdash; sheet-music-browsarr{% endblock %}
{% block content %}
<h1>Sign in</h1>
{% match error %}
  {% when Some with (msg) %}
    <p class="error">{{ msg }}</p>
  {% when None %}
{% endmatch %}
<form method="post" action="/login">
  <label>Password
    <input type="password" name="password" required autofocus autocomplete="current-password">
  </label>
  <button type="submit">Sign in</button>
</form>
{% endblock %}
