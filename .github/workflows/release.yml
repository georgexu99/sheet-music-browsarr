name: Build and publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  # Phase D smoke test — exercises the MuseScore pipeline end-to-end against
  # the live site. `continue-on-error: true` so it never blocks deploy:
  # MuseScore can be rate-limiting or Cloudflare-challenging at any moment,
  # and we still want the build to ship. The signal is the test outcome on
  # the Actions tab, plus the captured stderr (which the test panics with).
  musescore-smoke:
    name: MuseScore smoke
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name != 'pull_request'
    # Service container: MuseScore.com is behind Cloudflare's bot challenge,
    # so the smoke pipeline needs FlareSolverr to navigate past it. Pinning
    # to v3.3.21 because :latest (3.4.6) has the Xvfb startup regression
    # that bricks the container on a bunch of host kernels — same pin the
    # NAS deploy uses. shm_size 2gb is required by Chromium.
    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:v3.3.21
        ports:
          - 8191:8191
        env:
          LOG_LEVEL: info
          CAPTCHA_SOLVER: none
        # No Docker `--health-cmd` — the FS image ships neither wget nor
        # curl, and an empty healthcheck pipe was failing the container
        # at startup with the bare "Service container ... failed" error
        # (GHA aborts the job before the start logs are visible). Wait
        # for FS readiness in a dedicated step below instead, where we
        # can use the runner host's curl + actually log the polling.
        options: --shm-size=2gb
    env:
      # The job runs on the runner host (not inside a container), so the
      # service port is reachable via the host loopback after port mapping.
      FLARESOLVERR_URL: http://localhost:8191
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Wait for FlareSolverr readiness
        # FS spins up its bundled Chromium on startup (~10–20s on the
        # runner). Poll until /v1 returns the ready JSON or we time out.
        # Failing this step surfaces FS startup logs cleanly via
        # `docker logs` rather than the silent "service container
        # failed" we hit when relying on Docker's healthcheck.
        run: |
          for i in $(seq 1 30); do
            body=$(curl -sf http://localhost:8191/ || true)
            if echo "$body" | grep -q "FlareSolverr is ready"; then
              echo "FlareSolverr ready after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "FlareSolverr did not become ready in 60s; dumping container logs:"
          docker ps -a
          docker logs $(docker ps -a --filter 'ancestor=ghcr.io/flaresolverr/flaresolverr:v3.3.21' --format '{{.ID}}' | head -n1) || true
          exit 1
      - name: cargo test musescore_smoke (ignored)
        # `--ignored` is a libtest filter and must follow the `--` separator;
        # cargo itself doesn't accept it as a top-level flag.
        # The test auto-skips when FLARESOLVERR_URL is unset, so removing
        # the service block above is a clean toggle if FS ever flakes.
        run: cargo test musescore_smoke -- --ignored --nocapture

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sheet-music-browsarr
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Portainer redeploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: curl -fSs -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
