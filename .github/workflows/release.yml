name: Build and publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  # Phase D smoke test — exercises the MuseScore pipeline end-to-end against
  # the live site. `continue-on-error: true` so it never blocks deploy:
  # MuseScore can be rate-limiting or Cloudflare-challenging at any moment,
  # and we still want the build to ship. The signal is the test outcome on
  # the Actions tab, plus the captured stderr (which the test panics with).
  musescore-smoke:
    name: MuseScore smoke
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test musescore_smoke (ignored)
        # `--ignored` is a libtest filter and must follow the `--` separator;
        # cargo itself doesn't accept it as a top-level flag.
        run: cargo test musescore_smoke -- --ignored --nocapture

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/sheet-music-browsarr
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Portainer redeploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: curl -fSs -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
