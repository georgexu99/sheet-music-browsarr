# Drop this into Dockge / Portainer on the TerraMaster.
# Replace georgexu99 in the image tag once your GH repo is set up.
# Generate BROWSARR_SECRET_KEY with `openssl rand -hex 32` and set
# BROWSARR_ADMIN_PASSWORD only on first start; remove it from the env after the
# admin row is seeded (the password is now stored argon2-hashed in the DB).

services:
  sheet-music-browsarr:
    image: ghcr.io/georgexu99/sheet-music-browsarr:latest
    container_name: sheet-music-browsarr
    restart: unless-stopped
    ports:
      - "8686:8686"
    environment:
      TZ: America/Los_Angeles
      PUID: "1000"
      PGID: "1000"
      BROWSARR_PORT: "8686"
      BROWSARR_DB_PATH: /config/sheet-music-browsarr.db
      BROWSARR_LIBRARY_PATH: /library
      BROWSARR_SECURE_COOKIES: "1"
      # Durable (L2) search-result cache. Opt-in: set to "1" to persist
      # search results (notably the expensive MuseScore FlareSolverr solves)
      # in the SQLite DB so they survive container restarts/redeploys instead
      # of being re-paid. Backed by the existing /config DB volume below — no
      # extra service or volume needed. Leave unset for moka in-memory only.
      BROWSARR_PERSISTENT_SEARCH_CACHE: "1"
      BROWSARR_SECRET_KEY: "${BROWSARR_SECRET_KEY}"
      BROWSARR_ADMIN_PASSWORD: "${BROWSARR_ADMIN_PASSWORD}"
      RUST_LOG: sheet_music_browsarr=info,tower_http=info
    volumes:
      - /Volume1/docker/sheet-music-browsarr/config:/config
      - /Volume1/media/sheet-music:/library
